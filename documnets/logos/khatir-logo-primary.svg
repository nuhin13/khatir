<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="Khatir logo">
  <title>Khatir</title>
  <defs>
    <linearGradient id="khatir-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7BA084"/>
      <stop offset="100%" stop-color="#5C8067"/>
    </linearGradient>
    <linearGradient id="khatir-highlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.18"/>
