  <rect x="0" y="0" width="256" height="256" rx="70" ry="70" fill="url(#khatir-bg)"/>
  <rect x="0" y="0" width="256" height="256" rx="70" ry="70" fill="url(#khatir-highlight)"/>
  <text x="128" y="208"
        text-anchor="middle"
        font-family="'Noto Sans Bengali', 'Hind Siliguri', 'Kalpurush', sans-serif"
