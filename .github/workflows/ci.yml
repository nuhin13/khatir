name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Detect which apps changed so each app job only runs when relevant.
  changes:
    name: Detect changed apps
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      mobile: ${{ steps.filter.outputs.mobile }}
      admin: ${{ steps.filter.outputs.admin }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
              - '.github/workflows/ci.yml'
            mobile:
              - 'apps/mobile/**'
              - '.github/workflows/ci.yml'
            admin:
              - 'apps/admin/**'
              - '.github/workflows/ci.yml'

  # ── Backend (Django/DRF) ────────────────────────────────────────────
  api:
    name: api (lint + type + test)
    needs: changes
    if: ${{ needs.changes.outputs.api == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    env:
      DJANGO_ENV: test
      DJANGO_SECRET_KEY: ci-insecure-test-key
      DJANGO_DEBUG: "false"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      DB_NAME: khatir
      DB_USER: khatir
      DB_PASSWORD: khatir
      DB_HOST: localhost
      DB_PORT: "5432"
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: khatir
          POSTGRES_USER: khatir
          POSTGRES_PASSWORD: khatir
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U khatir"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:8
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv (with cache)
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: apps/api/uv.lock

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --locked

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Type-check (mypy)
        run: uv run mypy .

      - name: Check for missing migrations
        run: uv run python manage.py makemigrations --check --dry-run

      - name: Test (pytest)
        run: uv run pytest

  # ── Mobile (Flutter) ────────────────────────────────────────────────
  mobile:
    name: mobile (format + analyze + test)
    needs: changes
    if: ${{ needs.changes.outputs.mobile == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter (with cache)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.0
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Format check
        run: dart format --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze

      # iOS build is not run in CI (requires a macOS runner). Android
      # analyze + test is sufficient for the mobile gate at this stage.
      - name: Test
        run: flutter test

  # ── Admin portal (Next.js) ──────────────────────────────────────────
  admin:
    name: admin (lint + type + test + build)
    needs: changes
    if: ${{ needs.changes.outputs.admin == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/admin
    env:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node (with npm cache)
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Type-check (tsc)
        run: npm run typecheck

      - name: Test (vitest)
        run: npm run test

      - name: Build (next build)
        run: npm run build

  # Aggregate gate: a single required status for branch protection that
  # passes only when every triggered app job succeeded (or was skipped).
  ci:
    name: CI
    needs: [api, mobile, admin]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Verify no app job failed
        run: |
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ] || \
             [ "${{ contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "One or more app jobs failed or were cancelled."
            exit 1
          fi
          echo "All triggered app jobs passed."
