{% load i18n %}<!doctype html>
<html lang="bn">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex,nofollow">
  <title>{% block title %}{% translate "Khatir" %}{% endblock %}</title>
  <style>
    /* Notun Din palette — values are the single source of truth in
       packages/design-tokens/tokens.json. Exposed here as CSS custom
       properties so the server-rendered page matches the prototype's webPay
       without hardcoding colours inline. */
    :root {
      --ink: #2C3530;
      --ink2: #3D4A42;
      --sage: #7BA084;
      --sage-dk: #5C8067;
      --sage-bg: #E8F0EA;
      --rose: #E89B8B;
      --rose-dk: #C9755F;
      --rose-bg: #FBE9E3;
      --butter: #F4D58D;
      --butter-dk: #D9B45F;
      --butter-bg: #FBF1D8;
      --danger: #D14D3B;
      --danger-bg: #FBE5E1;
      --cream: #FBF6EE;
      --card: #FFFFFF;
      --line: #EFE6D8;
      --line-dk: #E0D5C2;
      --muted: #8C8578;
      --muted-dk: #6B6558;
      /* radius + spacing (px) from tokens.json */
      --r-card: 22px;
      --r-sm: 14px;
      --r-pill: 999px;
      --s3: 12px;
      --s4: 16px;
      --s5: 20px;
      --f-title: 'Plus Jakarta Sans', 'Hind Siliguri', -apple-system, sans-serif;
      --f-body: 'Hind Siliguri', 'Noto Sans Bengali', -apple-system, sans-serif;
      --f-mono: 'JetBrains Mono', 'Menlo', monospace;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--cream);
      color: var(--ink);
      font-family: var(--f-body);
      -webkit-font-smoothing: antialiased;
      line-height: 1.5;
    }
    .wrap {
      max-width: 440px;
      margin: 0 auto;
      min-height: 100vh;
      padding: var(--s5) var(--s4) calc(var(--s5) + env(safe-area-inset-bottom));
    }
    .center { text-align: center; }
    .muted { color: var(--muted); }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--r-card);
      padding: var(--s4);
    }
    .soft-sage {
      background: var(--sage-bg);
      border: 0;
    }
    .row {
      display: flex;
      align-items: center;
      gap: var(--s3);
    }
    .title {
      font-family: var(--f-title);
      font-weight: 800;
    }
    .amount {
      font-family: var(--f-title);
      font-weight: 800;
      font-size: 38px;
      color: var(--rose-dk);
      letter-spacing: -1px;
      margin-top: 4px;
    }
    .sectit {
      font-family: var(--f-title);
      font-weight: 800;
      font-size: 13px;
      margin: var(--s4) 0 8px;
    }
    .btn {
      display: flex;
      align-items: center;
      gap: var(--s3);
      width: 100%;
      border: 0;
      border-radius: var(--r-pill);
      padding: 13px var(--s4);
      font-family: var(--f-title);
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      text-decoration: none;
    }
    .btn.soft { background: var(--sage-bg); color: var(--sage-dk); justify-content: flex-start; }
    .btn.rose { background: var(--rose-dk); color: #fff; justify-content: center; }
    .btn.lg { padding: 15px var(--s4); font-size: 15px; }
    .field { margin-top: 10px; }
    .lab { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    .input {
      width: 100%;
      border: 1px solid var(--line-dk);
      border-radius: var(--r-sm);
      padding: 12px var(--s3);
      font-family: var(--f-body);
      font-size: 14px;
      background: var(--card);
    }
    .footnote {
      text-align: center;
      font-size: 10.5px;
      color: var(--muted);
      margin-top: 10px;
      font-family: var(--f-mono);
    }
    .icon {
      width: 48px; height: 48px;
      border-radius: 13px;
      background: var(--sage-bg);
      display: inline-grid;
      place-items: center;
      font-size: 24px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
