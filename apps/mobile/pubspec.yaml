name: khatir_mobile
description: "Khatir mobile app (landlord / manager / tenant)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  hooks_riverpod: ^2.6.1
  flutter_hooks: ^0.21.2

  # Routing
  go_router: ^16.2.4

  # Networking
  dio: ^5.9.0

  # Maps (OSM tiles via flutter_map; free, no API key) + lat/lng types
  flutter_map: ^8.3.0
  latlong2: ^0.9.1

  # Secure storage (auth tokens)
  flutter_secure_storage: ^9.2.4

  # Camera / gallery NID capture (EPIC-04 OCR). The picked image is uploaded
  # then discarded — never persisted on device beyond the upload.
  image_picker: ^1.2.2

  # Voice tenant entry (EPIC-04 T-012). Records a short Bangla clip (handles the
  # mic permission prompt) that is uploaded then discarded — never persisted on
  # device beyond the upload.
  record: ^6.2.0

  # Models / serialization (annotations; codegen via build_runner)
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # i18n
  intl: ^0.20.2

  # DMP PDF preview + share (EPIC-05 T-008). `printing` renders the generated
  # A4 PDF (pdfium) and provides system print/share; `share_plus` drives the
  # explicit WhatsApp/system share + save of the downloaded file.
  printing: ^5.14.3
  # share_plus pinned to ^12 (latest stable compatible with the project's
  # flutter_secure_storage ^9 → win32 ^5; share_plus ^13 forces win32 ^6 which
  # collides with secure-storage's transitive Windows plugin).
  share_plus: ^12.0.2

  # Shared Notun Din design tokens (consumed by path)
  khatir_tokens:
    path: ../../packages/design-tokens/dart
  sentry_flutter: ^9.21.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Codegen
  build_runner: ^2.4.13
  freezed: ^3.2.3
  json_serializable: ^6.9.0

flutter:
  uses-material-design: true
  # gen-l10n: generate AppLocalizations from lib/l10n/*.arb (see l10n.yaml).
  generate: true

  # Notun Din brand fonts. Family names match packages/design-tokens
  # (KhatirFonts). Bundle the OFL .ttf binaries under assets/fonts/ to make the
  # app render them offline; until the binaries are committed, Flutter falls
  # back to the platform default for these families (text still renders).
  # fonts:
  #   - family: Plus Jakarta Sans
  #     fonts:
  #       - asset: assets/fonts/PlusJakartaSans-Regular.ttf
  #       - asset: assets/fonts/PlusJakartaSans-Bold.ttf
  #         weight: 700
  #   - family: Hind Siliguri
  #     fonts:
  #       - asset: assets/fonts/HindSiliguri-Regular.ttf
  #       - asset: assets/fonts/HindSiliguri-SemiBold.ttf
  #         weight: 600
  #   - family: Caveat
  #     fonts:
  #       - asset: assets/fonts/Caveat-SemiBold.ttf
  #         weight: 600
